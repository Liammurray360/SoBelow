<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Below Entertainment</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="shortcut icon" href="favicon.ico">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0b0b0b;
  color: #f5f5f5;
}

.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,10,10,0.86);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

.nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
}

.nav a:hover { color: white; }

.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: url("bckgnd.svg") center/cover no-repeat;
  filter: brightness(1.9) contrast(1.15);
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.22);
}

.hero-logo {
  position: relative;
  z-index: 2;
  width: min(100vw, 1250px);
  padding: 90px 4% 45px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-logo img {
  width: 100%;
  max-height: 86svh;
  object-fit: contain;
  display: block;
}

.intro {
  padding: 90px 6% 75px;
  text-align: center;
}

.intro h1 {
  font-size: clamp(2.4rem, 6vw, 5rem);
  line-height: 1;
  margin: 0 0 20px;
}

.intro p {
  max-width: 900px;
  margin: auto;
  color: #ccc;
  line-height: 1.6;
  font-size: 1.1rem;
}

.buttons {
  margin-top: 26px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.button {
  padding: 13px 20px;
  border-radius: 999px;
  text-decoration: none;
  display: inline-block;
  font-weight: bold;
}

.primary { background: #d51616; color: white; }
.secondary { border: 1px solid #555; color: white; }

.footer {
  padding: 30px 8%;
  background: #050505;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.footer a {
  color: white;
  text-decoration: none;
}

.secret {
  font-size: 0.7rem;
  color: #555;
}

/* MOBILE */
@media (max-width: 850px) {
  .nav {
    position: fixed;
    padding: 14px 5%;
    flex-direction: column;
    gap: 10px;
  }

  .nav strong {
    font-size: 0.95rem;
  }

  .nav nav {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav a {
    margin: 0;
    font-size: 0.88rem;
  }

  .hero {
    min-height: 92svh;
  }

  .hero-bg {
    filter: brightness(1.65) contrast(1.1);
  }

  .hero-logo {
    width: 112vw;
    padding: 105px 0 30px;
  }

  .hero-logo img {
    max-height: 72svh;
  }

  .intro {
    padding: 62px 6% 58px;
  }

  .intro h1 {
    font-size: clamp(2.3rem, 12vw, 3.4rem);
  }

  .intro p {
    font-size: 1rem;
  }

  .buttons {
    display: grid;
    gap: 12px;
  }

  .button {
    width: min(100%, 320px);
    margin: auto;
    text-align: center;
  }

  .footer {
    padding: 28px 6%;
    flex-direction: column;
    gap: 14px;
    text-align: center;
  }
}
</style>
</head>

<body>

<header class="nav">
  <strong>SO BELOW</strong>
  <nav>
    <a href="shows.html">Shows</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="hero">
  <div class="hero-bg"></div>

  <div class="hero-logo">
    <img src="logo.svg" alt="So Below Entertainment">
  </div>
</main>

<section class="intro">
  <h1>Live events with weight.</h1>
  <p>Alternative, rock and heavy shows built properly.</p>

  <div class="buttons">
    <a class="button primary" href="shows.html">Shows</a>
    <a class="button secondary" href="contact.html">Contact</a>
  </div>
</section>

<footer class="footer">
  <div>
    © So Below Entertainment
    <div class="secret">A division of Secret Sauce</div>
  </div>

  <div>
    <a href="https://www.instagram.com/so.below.ent/" target="_blank">@so.below.ent</a>
  </div>
</footer>

</body>
</html>
