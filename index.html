<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Below Entertainment</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0b0b0b;
  color: #f5f5f5;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,10,10,0.85);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
}

.nav a:hover { color: white; }

/* HERO */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: url("bckgnd.svg") center/cover no-repeat;
  filter: brightness(2) contrast(1.2);
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

.hero-logo {
  position: relative;
  z-index: 2;
  width: 100%;
  display: flex;
  justify-content: center;
}

.hero-logo img {
  width: 100%;
  max-height: 95vh;
  object-fit: contain;
}

/* INTRO */
.intro {
  padding: 80px 8%;
  text-align: center;
}

.intro h1 { font-size: 3rem; }

.intro p {
  max-width: 700px;
  margin: auto;
  color: #ccc;
}

/* BUTTONS */
.button {
  padding: 12px 18px;
  border-radius: 999px;
  text-decoration: none;
  margin: 5px;
}

.primary { background: red; color: white; }
.secondary { border: 1px solid #555; color: white; }

/* FOOTER */
.footer {
  padding: 30px 8%;
  background: #050505;
  display: flex;
  justify-content: space-between;
}

.secret {
  font-size: 0.7rem;
  color: #555;
}
</style>
</head>

<body>

<header class="nav">
  <strong>SO BELOW</strong>
  <nav>
    <a href="shows.html">Shows</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="hero">
  <div class="hero-bg"></div>
  <div class="hero-logo">
    <img src="logo.svg">
  </div>
</main>

<section class="intro">
  <h1>Live events with weight.</h1>
  <p>Alternative, rock and heavy shows built properly.</p>

  <div>
    <a class="button primary" href="shows.html">Shows</a>
    <a class="button secondary" href="contact.html">Contact</a>
  </div>
</section>

<footer class="footer">
  <div>© So Below</div>
  <div class="secret">A division of Secret Sauce</div>
</footer>

</body>
</html>
