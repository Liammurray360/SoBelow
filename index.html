<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>So Below</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #080808;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

.landing {
  min-height: 100vh;
  position: relative;
  display: grid;
  place-items: center;
  padding: 35px 18px;
  overflow: hidden;
  background:
    repeating-linear-gradient(
      -12deg,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 2px,
      transparent 2px,
      transparent 9px
    ),
    radial-gradient(circle at 20% 25%, rgba(180,0,0,0.55), transparent 18%),
    radial-gradient(circle at 85% 70%, rgba(255,0,0,0.42), transparent 22%),
    linear-gradient(135deg, #111 0%, #000 55%, #170000 100%);
}

/* big ugly paint smears */
.landing::before {
  content: "";
  position: absolute;
  inset: -15%;
  background:
    radial-gradient(circle at 16% 20%, #c40000 0 4%, transparent 4.4%),
    radial-gradient(circle at 20% 24%, #8b0000 0 8%, transparent 8.5%),
    radial-gradient(circle at 82% 18%, #ff1010 0 5%, transparent 5.5%),
    radial-gradient(circle at 76% 63%, #a00000 0 10%, transparent 10.5%),
    radial-gradient(circle at 48% 88%, #d00000 0 7%, transparent 7.5%);
  filter: blur(2px);
  opacity: 0.75;
  transform: rotate(-8deg);
}

/* scratchy photocopy mess */
.landing::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.06) 0px,
      rgba(255,255,255,0.06) 1px,
      transparent 1px,
      transparent 18px
    ),
    repeating-linear-gradient(
      0deg,
      rgba(255,0,0,0.05) 0px,
      rgba(255,0,0,0.05) 2px,
      transparent 2px,
      transparent 27px
    );
  mix-blend-mode: screen;
  opacity: 0.45;
}

.logo-wrap {
  position: relative;
  z-index: 2;
  width: min(94vw, 930px);
  padding: clamp(18px, 4vw, 48px);
  background:
    linear-gradient(135deg, rgba(0,0,0,0.92), rgba(20,0,0,0.88)),
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 1px,
      transparent 1px,
      transparent 7px
    );
  border: 3px solid #111;
  outline: 2px solid rgba(255,0,0,0.75);
  box-shadow:
    -18px 18px 0 rgba(160,0,0,0.72),
    18px -14px 0 rgba(255,255,255,0.08),
    0 0 0 8px rgba(0,0,0,0.85);
  transform: rotate(-1.5deg);
}

.logo-wrap::before {
  content: "";
  position: absolute;
  inset: -20px;
  z-index: -1;
  background:
    linear-gradient(90deg, transparent 0 8%, #c90000 8% 13%, transparent 13% 100%),
    linear-gradient(177deg, transparent 0 62%, rgba(255,255,255,0.18) 62% 66%, transparent 66%);
  transform: rotate(3deg);
}

.logo-wrap::after {
  content: "SO BELOW";
  position: absolute;
  right: -18px;
  bottom: -18px;
  padding: 8px 14px;
  background: #d00000;
  color: #050505;
  font-weight: 900;
  letter-spacing: 0.2em;
  font-size: clamp(0.7rem, 1.6vw, 1rem);
  transform: rotate(2deg);
}

.logo-wrap img {
  display: block;
  width: 100%;
  max-height: 66vh;
  object-fit: contain;
  filter: contrast(1.35) saturate(0.9);
}

.tagline {
  margin-top: 22px;
  color: #e5e5e5;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  font-size: clamp(0.72rem, 1.6vw, 0.95rem);
  text-align: center;
}

.section {
  max-width: 980px;
  margin: auto;
  padding: 80px 20px;
}

h2 {
  display: inline-block;
  margin: 0 0 28px;
  padding: 8px 14px;
  background: #d00000;
  color: #050505;
  transform: rotate(-1deg);
  letter-spacing: 0.16em;
}

.event {
  position: relative;
  padding: 28px;
  background: #0d0d0d;
  border: 2px solid #222;
  box-shadow: -10px 10px 0 #8b0000;
}

.event::before {
  content: "";
  position: absolute;
  top: -14px;
  left: 22px;
  width: 120px;
  height: 26px;
  background: rgba(255,255,255,0.15);
  transform: rotate(-3deg);
}

.event h3 {
  margin-top: 0;
  letter-spacing: 0.1em;
}

.event p {
  color: #cfcfcf;
}

.button {
  display: inline-block;
  margin-top: 10px;
  padding: 11px 16px;
  background: #c90000;
  color: #050505;
  text-decoration: none;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

@media (max-width: 600px) {
  .logo-wrap {
    transform: rotate(-0.6deg);
    box-shadow:
      -8px 8px 0 rgba(160,0,0,0.72),
      0 0 0 6px rgba(0,0,0,0.85);
  }

  .logo-wrap::after {
    right: 8px;
    bottom: -14px;
  }
}
</style>
</head>

<body>

<main class="landing">
  <div class="logo-wrap">
    <img src="LandingPage.svg" alt="So Below Logo" />
    <div class="tagline">Live music from the underground</div>
  </div>
</main>

<section class="section">
  <h2>UPCOMING CHAOS</h2>

  <div class="event">
    <h3>STATE OF THE NATION VI</h3>
    <p>29 August • Rumours Lounge</p>
    <a class="button" href="#">Tickets Coming Soon</a>
  </div>
</section>

</body>
</html>
