<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Below</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
}

/* LANDING */
.landing {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  position: relative;
  overflow: hidden;
}

/* TEXTURE OVERLAY */
.landing::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    url('https://www.transparenttextures.com/patterns/asfalt-dark.png'),
    radial-gradient(circle at 30% 20%, rgba(255,0,0,0.15), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(120,0,0,0.2), transparent 50%);
  opacity: 0.7;
}

/* PAINT SPLATTER */
.landing::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,0,0.3) 0 60px, transparent 80px),
    radial-gradient(circle at 80% 60%, rgba(200,0,0,0.25) 0 80px, transparent 120px),
    radial-gradient(circle at 50% 90%, rgba(255,0,0,0.2) 0 50px, transparent 100px);
  mix-blend-mode: overlay;
}

/* LOGO FRAME */
.logo-wrap {
  position: relative;
  z-index: 2;
  max-width: 900px;
  width: 100%;
  padding: 40px;
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(255,0,0,0.3);
  transform: rotate(-1deg);
}

/* SCRATCH BORDER */
.logo-wrap::before {
  content: "";
  position: absolute;
  inset: -6px;
  border: 1px dashed rgba(255,255,255,0.2);
  transform: rotate(1deg);
}

/* LOGO */
.logo-wrap img {
  width: 100%;
  max-height: 65vh;
  object-fit: contain;
  filter: contrast(1.2) brightness(1.1);
}

/* TAGLINE */
.tagline {
  margin-top: 20px;
  font-size: 0.85rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #ff4d4d;
}

/* EVENTS */
.section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
}

h2 {
  letter-spacing: 3px;
  color: #ff2a2a;
}

/* EVENT CARD */
.event {
  margin-top: 30px;
  padding: 25px;
  background: rgba(0,0,0,0.8);
  border-left: 4px solid red;
  text-align: left;
}

.event h3 {
  margin: 0;
}

.event p {
  margin: 5px 0 10px;
  color: #bbb;
}

/* BUTTON */
.button {
  display: inline-block;
  padding: 10px 15px;
  border: 1px solid red;
  text-decoration: none;
  color: white;
  font-size: 0.8rem;
  letter-spacing: 1px;
}

.button:hover {
  background: red;
}

/* MOBILE */
@media (max-width: 600px) {
  .logo-wrap {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="landing">
  <div class="logo-wrap">
    <img src="LandingPage.svg" alt="So Below Logo">
    <div class="tagline">Live music from the underground</div>
  </div>
</div>

<section class="section">
  <h2>UPCOMING CHAOS</h2>

  <div class="event">
    <h3>STATE OF THE NATION VI</h3>
    <p>29 August • Rumours Lounge</p>
    <a class="button" href="#">Tickets Coming Soon</a>
  </div>

</section>

</body>
</html>
