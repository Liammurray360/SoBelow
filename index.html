<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Below Entertainment</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="shortcut icon" href="favicon.ico">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0b0b0b;
  color: #f5f5f5;
}

.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,10,10,0.86);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

.nav strong {
  letter-spacing: 0.08em;
}

.nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
}

.nav a:hover { color: white; }

.hero {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: url("bckgnd.svg") center/cover no-repeat;
  filter: brightness(1.9) contrast(1.15);
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

.hero-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 90vw;
  max-width: 1200px;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.hero-logo img {
  width: 100%;
  display: block;
}

.intro {
  padding: 90px 6% 75px;
  text-align: center;
}

.intro h1 {
  font-size: clamp(2.4rem, 6vw, 5rem);
  margin: 0 0 20px;
}

.intro p {
  max-width: 900px;
  margin: auto;
  color: #ccc;
  line-height: 1.6;
}

.buttons {
  margin-top: 26px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.button {
  padding: 13px 20px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: bold;
}

.primary { background: #d51616; color: white; }
.secondary { border: 1px solid #555; color: white; }

.footer {
  padding: 25px 8%;
  background: #050505;
  text-align: center;
}

.secret {
  font-size: 0.7rem;
  color: #555;
}

@media (max-width: 850px) {
  .nav {
    flex-direction: column;
    gap: 10px;
    padding: 14px 5%;
  }

  .nav nav {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav a {
    margin: 0;
    font-size: 0.9rem;
  }

  .hero-logo {
    width: 160vw;
  }

  .hero-logo img {
    transform: scale(1.2);
  }

  .intro {
    padding: 60px 6%;
  }

  .intro h1 {
    font-size: clamp(2.3rem, 12vw, 3.4rem);
  }

  .buttons {
    display: grid;
    gap: 12px;
  }

  .button {
    width: min(100%, 320px);
    margin: auto;
    text-align: center;
  }
}
</style>
</head>

<body>

<header class="nav">
  <strong>SO BELOW ENTERTAINMENT</strong>

  <nav>
    <a href="shows.html">Shows</a>
    <a href="past-shows.html">Past Shows</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="hero">
  <div class="hero-bg"></div>

  <div class="hero-logo">
    <img src="logo.svg" alt="So Below Entertainment">
  </div>
</main>

<section class="intro">
  <h1>Live events with weight.</h1>
  <p>Alternative, rock and heavy shows built properly.</p>

  <div class="buttons">
    <a class="button primary" href="shows.html">Shows</a>
    <a class="button secondary" href="contact.html">Contact</a>
  </div>
</section>

<footer class="footer">
  <div class="secret">A division of Secret Sauce</div>
</footer>

</body>
</html>
